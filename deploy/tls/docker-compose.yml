version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
      POSTGRES_DB: tasks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks"]
      interval: 3s
      timeout: 3s
      retries: 10

  tasks:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    environment:
      - TASKS_PORT=8082
      - AUTH_MODE=http
      - AUTH_BASE_URL=http://host.docker.internal:8081
      - DATABASE_URL=postgres://tasks:tasks@db:5432/tasks?sslmode=disable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"
    networks:
      - app
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/tls:ro
    ports:
      - "8443:8443"
    networks:
      - app
    depends_on:
      - tasks

networks:
  app:
    driver: bridge

volumes:
  pgdata:
